services:
  qiaoqiaole:
    build:
      context: .
      dockerfile: Dockerfile
    image: qiaoqiaole:latest
    container_name: qiaoqiaole
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8843:80"
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: qiaoqiaole-api:latest
    container_name: qiaoqiaole-api
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/qiaoqiaole.sqlite
      PORT: 3000
      QIAOQIAOLE_USERNAME: ${QIAOQIAOLE_USERNAME:?QIAOQIAOLE_USERNAME is required}
      QIAOQIAOLE_PASSWORD: ${QIAOQIAOLE_PASSWORD:?QIAOQIAOLE_PASSWORD is required}
      XHS_COOKIE: ${XHS_COOKIE:-}
    volumes:
      - qiaoqiaole_data:/data

volumes:
  qiaoqiaole_data:
